<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sol Snacks | Snacks Deshidratados al Sol</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --main-bg: #faf7f2;
      --main-green: #90b77d;
      --accent-green: #5a7850;
      --beige: #fff9ef;
      --shadow: 0 6px 32px rgba(90, 119, 80, 0.10);
      --text-main: #2e3c28;
      --text-soft: #6a7c60;
      --orange: #ffb84c;
      --badge-bg: #eaf4ea;
      --badge-text: #5a7850;
      --border-radius: 2rem;
    }

    html, body {
      background: var(--main-bg);
      font-family: 'Quicksand', 'Montserrat', Arial, sans-serif;
      color: var(--text-main);
      margin: 0;
      padding: 0;
      scroll-behavior: smooth;
    }

    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 1.2rem;
    }

    /* Hero Section */
    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 70vh;
      background: linear-gradient(120deg, #fff9ef 70%, #eaf4ea 100%);
      border-radius: 0 0 60px 60px;
      box-shadow: var(--shadow);
      text-align: center;
      position: relative;
      overflow: hidden;
      margin-bottom: 2rem;
    }
    .hero img {
      width: 96px;
      margin-bottom: 1rem;
      filter: drop-shadow(0 2px 12px #9dbd8e33);
      border-radius: 50%;
      background: #fff;
      padding: 0.3rem;
    }
    .hero h1 {
      font-size: 2.6rem;
      font-family: 'Montserrat', Arial, sans-serif;
      font-weight: 700;
      margin-bottom: 1rem;
      color: var(--main-green);
    }
    .hero p {
      font-size: 1.2rem;
      color: var(--text-soft);
      margin-bottom: 2.2rem;
      line-height: 1.5;
    }
    .cta-btn {
      background: var(--main-green);
      color: #fff;
      padding: 1rem 2.6rem;
      border: none;
      border-radius: var(--border-radius);
      font-size: 1.25rem;
      font-family: 'Quicksand', Arial, sans-serif;
      letter-spacing: .03em;
      font-weight: 700;
      box-shadow: var(--shadow);
      transition: background 0.2s;
      cursor: pointer;
    }
    .cta-btn:hover {
      background: var(--accent-green);
    }
    /* Badges */
    .badges {
      display: flex;
      gap: 1rem;
      justify-content: center;
      margin: 1.5rem 0;
      flex-wrap: wrap;
    }
    .badge {
      background: var(--badge-bg);
      color: var(--badge-text);
      border-radius: 1.2rem;
      padding: 0.35rem 1.3rem;
      font-size: .95rem;
      font-weight: 700;
      letter-spacing: .02em;
      box-shadow: 0 2px 10px #dbeede66;
      margin-bottom: 0.5rem;
    }

    /* Benefits Section */
    .benefits-section {
      padding: 3rem 0 2rem 0;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .benefits-section h2 {
      font-size: 2.2rem;
      margin-bottom: 0.5rem;
      color: var(--accent-green);
      font-weight: 700;
    }
    .benefits-list {
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
      margin-top: 2rem;
      justify-content: center;
    }
    .benefit-card {
      background: #fff;
      border-radius: var(--border-radius);
      box-shadow: var(--shadow);
      width: 250px;
      padding: 2rem 1.2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: transform 0.15s;
    }
    .benefit-card:hover { transform: translateY(-6px) scale(1.04); }
    .benefit-card img {
      width: 46px;
      margin-bottom: 1rem;
    }
    .benefit-card h4 {
      font-size: 1.13rem;
      margin-bottom: 0.4rem;
      color: var(--main-green);
      font-weight: 700;
    }
    .benefit-card p {
      font-size: 0.98rem;
      color: var(--text-soft);
    }

    /* Products Section */
    .products-section {
      padding: 3rem 0 2rem 0;
      text-align: center;
    }
    .products-section h2 {
      color: var(--main-green);
      font-size: 2rem;
      margin-bottom: 2rem;
      font-weight: 700;
    }
    .product-list {
      display: flex;
      gap: 2rem;
      justify-content: center;
      flex-wrap: wrap;
    }
    .product-card {
      background: #fff;
      border-radius: var(--border-radius);
      box-shadow: var(--shadow);
      width: 260px;
      padding: 1.3rem 1rem 2rem 1rem;
      transition: transform 0.15s;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .product-card:hover { transform: translateY(-4px) scale(1.025); }
    .product-card img {
      width: 95%;
      border-radius: 1.2rem;
      margin-bottom: 1.1rem;
      box-shadow: 0 2px 12px #b8d8be22;
    }
    .product-card h3 {
      font-size: 1.2rem;
      margin-bottom: 0.6rem;
      color: var(--accent-green);
      font-weight: 700;
    }
    .product-card p {
      color: var(--text-soft);
      font-size: 1.01rem;
    }

    /* Testimonials Section */
    .testimonials-section {
      padding: 2.3rem 0 2rem 0;
      background: var(--beige);
      border-radius: 2rem;
      margin: 2rem 0;
      box-shadow: 0 2px 24px #d2c4b622;
      text-align: center;
    }
    .testimonials-section h2 {
      color: var(--accent-green);
      margin-bottom: 1.5rem;
      font-size: 1.4rem;
      font-weight: 700;
    }
    .testimonial-list {
      display: flex;
      gap: 1.2rem;
      justify-content: center;
      flex-wrap: wrap;
